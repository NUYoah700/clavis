<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技能面板</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=JetBrains+Mono:wght@400;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0908;
  --bg-warm: #0d0c0b;
  --surface: #131211;
  --surface2: #1a1816;
  --border: rgba(255,255,255,0.05);
  --border-active: rgba(201,169,110,0.25);
  --text: #f0ebe0;
  --text2: #9a9588;
  --text3: #5c5850;
  --gold: #c9a96e;
  --gold-dim: #8b7355;
  --copper: #c17e60;
  --warm-glow: rgba(201,169,110,0.08);
  --shadow: 0 2px 8px rgba(0,0,0,.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.5);
  --radius: 4px;
  --radius-lg: 8px;
  --font-serif: "Playfair Display", "Noto Serif SC", Georgia, serif;
  --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --mono: "JetBrains Mono", "SF Mono", "Cascadia Code", monospace;
  --spring: cubic-bezier(0.22, 0.61, 0.36, 1);
  --ease: cubic-bezier(0.25, 0.1, 0.25, 1.0);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%; background:var(--bg); color:var(--text);
  font-family:var(--font-body); font-size:13px; line-height:1.6;
  overflow:hidden; user-select:none; -webkit-user-select:none;
  -webkit-font-smoothing:antialiased;
}

/* Warm ambient glow */
body::before {
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse 60% 50% at 15% 10%, rgba(201,169,110,.025) 0%, transparent 60%),
              radial-gradient(ellipse 40% 40% at 85% 90%, rgba(193,126,96,.02) 0%, transparent 60%);
}

/* Grain texture */
body::after {
  content:""; position:fixed; inset:0; pointer-events:none; z-index:999; opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

body { display:flex; position:relative; z-index:1; }

/* === SIDEBAR === */
.sidebar {
  width:60px; min-width:60px; z-index:10; display:flex; flex-direction:column;
  align-items:center; padding:16px 0; gap:3px; overflow-y:auto; overflow-x:hidden;
  background:rgba(13,12,11,.8); border-right:1px solid var(--border);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  transition:width 350ms var(--ease);
}
.sidebar::-webkit-scrollbar { width:0; }
.sidebar:hover { width:185px; }
.sidebar:hover .cat-btn { justify-content:flex-start; padding-left:15px; }
.sidebar:hover .cat-label { opacity:1; width:auto; margin-left:10px; }
.sidebar:hover .cat-badge { opacity:1; }

.sidebar-logo {
  width:34px; height:34px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg, var(--gold), var(--copper));
  display:flex; align-items:center; justify-content:center;
  margin-bottom:12px; box-shadow:0 0 20px rgba(201,169,110,.2);
  transition:all 350ms var(--ease);
}
.sidebar-logo svg { width:15px; height:15px; color:#0a0908; flex-shrink:0; }
.sidebar-logo-text {
  opacity:0; width:0; overflow:hidden; white-space:nowrap;
  color:var(--gold); font-size:14px; font-weight:700; margin-left:10px;
  font-family:var(--font-serif); font-style:italic; letter-spacing:-0.01em;
  transition:all 350ms var(--ease);
}
.sidebar:hover .sidebar-logo { width:150px; border-radius:var(--radius-lg); }
.sidebar:hover .sidebar-logo-text { opacity:1; width:auto; }

.sidebar-divider {
  width:24px; height:1px; background:linear-gradient(90deg, transparent, var(--border), transparent);
  margin:8px 0; flex-shrink:0; transition:width 350ms var(--ease);
}
.sidebar:hover .sidebar-divider { width:150px; }

.cat-btn {
  width:42px; height:42px; border-radius:50%; border:none;
  background:transparent; cursor:pointer; display:flex; align-items:center;
  justify-content:center; color:var(--text3); flex-shrink:0;
  transition:all 280ms var(--ease); position:relative;
}
.cat-btn:hover { background:var(--surface2); color:var(--text2); border-radius:var(--radius-lg); }
.cat-btn:active { transform:scale(.94); transition:100ms; }
.cat-btn.active {
  background:var(--warm-glow); color:var(--gold);
  box-shadow:0 0 12px rgba(201,169,110,.1);
  border-radius:var(--radius-lg);
}
.cat-btn.active::after {
  content:""; position:absolute; left:0; top:12px; bottom:12px;
  width:2px; background:linear-gradient(180deg, var(--gold), var(--copper));
  border-radius:0 1px 1px 0;
}
.cat-btn svg { width:18px; height:18px; flex-shrink:0; }
.cat-label {
  opacity:0; width:0; overflow:hidden; white-space:nowrap;
  font-size:12px; font-weight:500; color:inherit; font-family:var(--font-body);
  transition:all 350ms var(--ease);
}
.cat-badge {
  opacity:0; margin-left:auto; margin-right:8px;
  font-size:10px; font-weight:600; color:var(--text3);
  background:var(--surface2); border-radius:10px; padding:2px 8px;
  font-family:var(--mono); transition:opacity 350ms var(--ease);
}
.cat-btn.active .cat-badge { background:var(--warm-glow); color:var(--gold); }

/* === MAIN === */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }

/* === HEADER === */
.header {
  display:flex; align-items:center; gap:14px;
  padding:20px 28px; min-height:60px; flex-shrink:0;
  border-bottom:1px solid var(--border);
  background:rgba(13,12,11,.8); backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px); -webkit-app-region:drag; z-index:5;
}
.header-icon { color:var(--gold); flex-shrink:0; display:flex; }
.header-icon svg { width:18px; height:18px; }
.header-title {
  font-weight:700; font-size:16px; font-family:var(--font-serif);
  font-style:italic; letter-spacing:-0.01em; color:var(--text);
}
.header-count { font-size:11px; color:var(--text3); font-family:var(--mono); }
.header-total {
  margin-left:auto; margin-right:10px; font-size:10px; color:var(--text3);
  background:var(--surface2); border:1px solid var(--border);
  border-radius:12px; padding:4px 12px; font-family:var(--mono);
  transition:all 280ms var(--ease);
}
.header-total:hover { border-color:rgba(201,169,110,.2); color:var(--text2); }

.search-btn {
  width:220px; padding:9px 14px; border-radius:20px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--text3); font-size:12px; font-family:var(--font-body); cursor:pointer;
  display:flex; align-items:center; gap:8px; text-align:left;
  transition:all 280ms var(--ease); -webkit-app-region:no-drag;
}
.search-btn:hover { border-color:rgba(201,169,110,.3); color:var(--text2); background:var(--surface); }
.search-btn svg { width:14px; height:14px; flex-shrink:0; }
.search-shortcut {
  margin-left:auto; font-size:10px; color:var(--text3);
  border:1px solid var(--border); border-radius:4px; padding:2px 6px;
  font-family:var(--mono); flex-shrink:0;
}

.popout-btn {
  width:34px; height:34px; border-radius:50%; border:1px solid var(--border);
  background:var(--surface2); cursor:pointer; color:var(--text3);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 280ms var(--ease); -webkit-app-region:no-drag;
}
.popout-btn:hover { border-color:var(--border-active); color:var(--gold); }
.popout-btn:active { transform:scale(.92); transition:100ms; }

/* === RECENT === */
.recent-bar {
  display:flex; align-items:center; gap:8px;
  padding:10px 28px; border-bottom:1px solid var(--border);
  background:rgba(13,12,11,.4); overflow-x:auto; flex-shrink:0;
  transition:all 250ms var(--ease); backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.recent-bar::-webkit-scrollbar { height:0; }
.recent-bar.hidden { opacity:0; height:0; padding-top:0; padding-bottom:0; border-bottom:none; overflow:hidden; }
.recent-label {
  font-size:9px; color:var(--text3); text-transform:uppercase;
  letter-spacing:.1em; flex-shrink:0; font-family:var(--mono);
}
.recent-chip {
  padding:5px 14px; border-radius:14px; border:1px solid var(--border);
  background:var(--surface); cursor:pointer; font-size:11px;
  font-family:var(--mono); color:var(--text2); white-space:nowrap;
  transition:all 250ms var(--ease); flex-shrink:0; position:relative; overflow:hidden;
}
.recent-chip:hover {
  border-color:var(--gold); color:var(--gold);
  background:var(--warm-glow); box-shadow:0 0 12px var(--warm-glow);
}
.recent-chip:active { transform:scale(.94); }

/* === CONTENT === */
.content {
  flex:1; overflow-y:auto; padding:28px;
  display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
  gap:12px; align-content:start;
  -webkit-overflow-scrolling:touch; scroll-behavior:smooth;
}
.content::-webkit-scrollbar { width:4px; }
.content::-webkit-scrollbar-track { background:transparent; }
.content::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.cat-section-header {
  grid-column:1 / -1; display:flex; align-items:center; gap:10px;
  padding:22px 0 8px; color:var(--gold-dim); font-size:11px;
  font-family:var(--font-serif); font-style:italic; letter-spacing:.04em;
}
.cat-section-header:first-child { padding-top:0; }
.cat-section-header::after {
  content:""; flex:1; height:1px;
  background:linear-gradient(90deg, rgba(201,169,110,.15), transparent);
  margin-left:8px;
}

/* === EMPTY === */
.empty-state {
  grid-column:1 / -1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:100px 20px; color:var(--text3);
}
.empty-icon {
  width:96px; height:96px; border-radius:50%; margin-bottom:24px;
  border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
  color:var(--text3); background:var(--surface);
}
.empty-icon svg { width:40px; height:40px; opacity:.3; }
.empty-title {
  font-size:20px; font-weight:700; color:var(--text2); margin-bottom:8px;
  font-family:var(--font-serif); font-style:italic;
}
.empty-desc { font-size:12px; }
.no-results { grid-column:1 / -1; text-align:center; padding:60px 20px; color:var(--text3); }

/* === SKILL CARD - Gallery style === */
.skill-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:18px 20px; cursor:pointer;
  transition:all 350ms var(--spring); position:relative;
  display:flex; flex-direction:column; gap:6px;
  overflow:hidden; -webkit-tap-highlight-color:transparent;
}
.skill-card::before {
  content:""; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  opacity:0; transition:opacity 350ms var(--ease);
}
.skill-card:hover::before { opacity:1; }
.skill-card:hover {
  border-color:rgba(201,169,110,.2); transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(0,0,0,.4), 0 0 60px rgba(201,169,110,.04);
}
.skill-card:active { transform:scale(.975); transition:100ms; }

.skill-card .skill-cmd {
  font-family:var(--mono); font-size:13px; font-weight:600;
  color:var(--gold); letter-spacing:-0.01em;
}
.skill-card .skill-desc { font-size:11px; color:var(--text2); line-height:1.55; }
.skill-card .skill-cat-tag { font-size:10px; color:var(--text3); margin-top:3px; font-style:italic; }

/* Star */
.skill-card .card-star {
  position:absolute; top:10px; right:10px; width:22px; height:22px;
  border-radius:50%; border:none; background:transparent; cursor:pointer;
  color:var(--text3); display:flex; align-items:center; justify-content:center;
  opacity:0; transition:all 180ms var(--ease); font-size:11px; z-index:2;
}
.skill-card:hover .card-star { opacity:1; }
.skill-card .card-star:hover { color:var(--gold); transform:scale(1.15); }
.skill-card .card-star.faved { opacity:1; color:var(--gold); }

.skill-card.flash {
  animation:cardFlash 700ms var(--spring);
}
@keyframes cardFlash {
  0% { background:var(--warm-glow); border-color:var(--gold); box-shadow:0 0 30px var(--warm-glow); transform:scale(1.01); }
  100% { background:var(--surface); border-color:var(--border); box-shadow:none; transform:scale(1); }
}

/* Ripple */
.ripple {
  position:absolute; border-radius:50%; pointer-events:none;
  background:rgba(201,169,110,.15); transform:scale(0);
  animation:rippleAnim 600ms ease-out;
}
@keyframes rippleAnim { to { transform:scale(4); opacity:0; } }

/* === SPOTLIGHT === */
.spotlight-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,.5); backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  align-items:flex-start; justify-content:center; padding-top:14vh;
}
.spotlight-overlay.show { display:flex; }

.spotlight {
  width:500px; max-width:92vw; background:rgba(19,18,17,.94);
  border:1px solid var(--border-active); border-radius:var(--radius-lg);
  box-shadow:0 20px 60px rgba(0,0,0,.6), 0 0 60px rgba(201,169,110,.05);
  backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
  display:flex; flex-direction:column; overflow:hidden;
  animation:spotlightIn 300ms var(--spring);
}
@keyframes spotlightIn {
  from { opacity:0; transform:scale(.94) translateY(-10px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}
.spotlight-input {
  padding:18px 22px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
}
.spotlight-input svg { width:18px; height:18px; color:var(--text3); flex-shrink:0; }
.spotlight-input input {
  flex:1; border:none; background:transparent; color:var(--text);
  font-size:16px; font-family:var(--font-serif); font-style:italic; outline:none;
}
.spotlight-input input::placeholder { color:var(--text3); font-style:normal; font-family:var(--font-body); }
.spotlight-esc {
  font-size:10px; color:var(--text3); background:var(--surface2);
  border-radius:4px; padding:3px 8px; font-family:var(--mono);
}
.spotlight-results {
  max-height:380px; overflow-y:auto; padding:6px;
}
.spotlight-results::-webkit-scrollbar { width:3px; }
.spotlight-results::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.spotlight-item {
  display:flex; align-items:center; gap:10px; padding:10px 16px;
  border-radius:var(--radius); cursor:pointer; transition:all 120ms var(--ease);
}
.spotlight-item:hover, .spotlight-item.selected { background:var(--surface2); }
.spotlight-item:active { transform:scale(.98); }
.spotlight-item .sp-cmd { font-family:var(--mono); font-size:13px; font-weight:600; color:var(--gold); }
.spotlight-item .sp-cat { font-size:10px; color:var(--text3); margin-left:auto; font-style:italic; }
.spotlight-item .sp-desc { font-size:11px; color:var(--text2); flex:1; }
.spotlight-no { text-align:center; padding:28px; color:var(--text3); font-family:var(--font-serif); font-style:italic; }

/* === TOAST === */
.toast-container {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  z-index:999; display:flex; flex-direction:column; align-items:center;
  gap:6px; pointer-events:none;
}
.toast {
  background:rgba(19,18,17,.92); border:1px solid var(--border-active);
  border-radius:20px; padding:12px 20px; font-size:12px;
  color:var(--text); box-shadow:var(--shadow-lg);
  animation:toastIn 400ms var(--spring);
  display:flex; align-items:center; gap:9px; pointer-events:auto;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
}
.toast .toast-icon { color:var(--gold); display:flex; flex-shrink:0; }
.toast code {
  background:var(--surface2); color:var(--gold); padding:3px 8px;
  border-radius:3px; font-family:var(--mono); font-size:11px;
}
@keyframes toastIn {
  from { opacity:0; transform:translateY(12px) scale(.93); }
  to { opacity:1; transform:translateY(0) scale(1); }
}
.toast.out { opacity:0; transform:translateY(-6px) scale(.95); transition:all 250ms var(--ease); }

/* === CONTEXT MENU === */
.context-menu {
  display:none; position:fixed; z-index:600; min-width:150px;
  background:rgba(19,18,17,.96); border:1px solid var(--border-active);
  border-radius:var(--radius); padding:4px;
  box-shadow:0 12px 40px rgba(0,0,0,.6);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  animation:ctxIn 150ms var(--ease);
}
@keyframes ctxIn { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }
.context-menu .ctx-item {
  display:flex; align-items:center; gap:8px; padding:8px 14px;
  border-radius:var(--radius); cursor:pointer; font-size:12px; border:none;
  background:transparent; color:var(--text); width:100%; text-align:left;
  font-family:var(--font-body); transition:all 120ms;
}
.context-menu .ctx-item:hover { background:var(--surface2); }
.context-menu .ctx-item:active { transform:scale(.97); }
.context-menu .ctx-divider { height:1px; background:var(--border); margin:3px 8px; }

/* 恢复 button in backup view */
.restore-btn:hover { border-color:var(--gold) !important; color:var(--gold) !important; background:var(--warm-glow) !important; }

/* Density toggle */
.density-btn {
  width:34px; height:34px; border-radius:50%; border:1px solid var(--border);
  background:var(--surface2); cursor:pointer; color:var(--text3);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 280ms var(--ease); -webkit-app-region:no-drag;
}
.density-btn:hover { border-color:var(--border-active); color:var(--gold); }
.density-btn:active { transform:scale(.92); transition:100ms; }
body.compact .density-btn { color:var(--gold); border-color:var(--border-active); }

/* Compact mode */
body.compact .content {
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:4px; padding:16px 28px;
}
body.compact .skill-card {
  padding:7px 14px; border-radius:var(--radius); flex-direction:row;
  align-items:center; gap:8px; border:none; background:transparent;
}
body.compact .skill-card:hover { background:var(--surface); border:none; transform:none; box-shadow:none; }
body.compact .skill-card::before { display:none; }
body.compact .skill-card .skill-cmd {
  font-size:12px; white-space:nowrap; min-width:fit-content;
  -webkit-text-fill-color:var(--gold); color:var(--gold); background:none;
}
body.compact .skill-card .skill-desc {
  font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; flex:1; line-height:1.2;
}
body.compact .skill-card .card-star { display:none; }
body.compact .skill-card .skill-cat-tag { display:none; }
body.compact .skill-card:active { transform:scale(.99); }
body.compact .cat-section-header { padding:14px 0 4px; font-size:10px; }

/* Mobile */
@media(max-width:600px){ .content{grid-template-columns:repeat(2,1fr);gap:8px;padding:16px;} .skill-card{padding:14px;} }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <span class="sidebar-logo-text">技能面板</span>
  </div>
  <div class="sidebar-divider"></div>
</aside>

<div class="main">
  <div class="header">
    <span class="header-icon" id="headerIcon"></span>
    <span class="header-title" id="headerTitle">技能面板</span>
    <span class="header-count" id="headerCount"></span>
    <span class="header-total" id="headerTotal"></span>
    <button class="search-btn" id="searchBtn" onclick="openSpotlight()">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <span>搜索技能...</span>
      <span class="search-shortcut">Ctrl+K</span>
    </button>
    <button class="popout-btn" title="独立竖版" onclick="openVertical()">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>

function renderRecent(){var r=getRecent();if(r.length===0){recentBar.classList.add("hidden");return;}recentBar.classList.remove("hidden");while(recentBar.children.length>1)recentBar.lastChild.remove();r.forEach(function(i){var c=document.createElement("span");c.className="recent-chip";c.textContent=i.cmd;c.onclick=function(e){e.stopPropagation();copySkillDirect(i.cmd);createRipple(c,e.clientX-c.getBoundingClientRect().left,e.clientY-c.getBoundingClientRect().top);};recentBar.appendChild(c);});}
function selectCat(cat){activeCat=cat;headerIcon.innerHTML=cat.icon;headerTitle.textContent=cat.label;headerCount.textContent=cat.skills.length+" 个技能";CATS.forEach(function(c){c._btn.classList.toggle("active",c===cat);});renderSkills(cat.skills,false);}
function renderSkills(个技能,showCat){if(个技能.length===0){content.innerHTML='<div class="no-results"><p>No matching 个技能 found</p></div>';return;}content.innerHTML=个技能.map(function(s){var isF=isFaved(s.cmd);var star='<button class="card-star'+(isF?' faved':'')+'" onclick="event.stopPropagation();toggleFav(\''+escAttr(s.cmd)+'\');this.classList.toggle(\'faved\');favBtn._updateCount();">'+(isF?ICONS.star:ICONS.starOutline)+'</button>';var tag=showCat?'<span class="skill-cat-tag">'+esc(s._catLabel||'')+'</span>':'';return '<div class="skill-card" data-cmd="'+escAttr(s.cmd)+'" onclick="skillClick(this,event)" oncontextmenu="showContext(event,this)">'+star+'<div class="skill-cmd">'+esc(s.cmd)+'</div><div class="skill-desc">'+esc(s.desc)+'</div>'+tag+'</div>';}).join("");}
function skillClick(card,e){card.classList.add("flash");setTimeout(function(){card.classList.remove("flash");},700);createRipple(card,e.clientX-card.getBoundingClientRect().left,e.clientY-card.getBoundingClientRect().top);copySkillDirect(card.dataset.cmd);}
function copySkillDirect(cmd){var f=null;CATS.forEach(function(c){c.skills.forEach(function(s){if(s.cmd===cmd){s._catId=c.id;s._catLabel=c.label;f=s;}});});if(f)addRecent(f);navigator.clipboard.writeText(cmd).then(function(){showToast(cmd);}).catch(function(){showToast(cmd);});renderRecent();}
function createRipple(el,x,y){var r=document.createElement("span");r.className="ripple";var s=Math.max(el.offsetWidth,el.offsetHeight)*2;r.style.width=r.style.height=s+"px";r.style.left=(x-s/2)+"px";r.style.top=(y-s/2)+"px";el.style.position=el.style.position||"relative";el.style.overflow="hidden";el.appendChild(r);r.addEventListener("animationend",function(){r.remove();});}
function showToast(cmd){var t=document.createElement("div");t.className="toast";t.innerHTML='<span class="toast-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> 已复制 <code>'+esc(cmd)+'</code>';toastContainer.appendChild(t);t._timer=setTimeout(function(){t.classList.add("out");setTimeout(function(){t.remove();},250);},2500);}
function showContext(e,card){e.preventDefault();e.stopPropagation();var cmd=card.dataset.cmd,isF=isFaved(cmd);contextMenu.innerHTML='<button class="ctx-item" onclick="copySkillDirect(\''+escAttr(cmd)+'\');hideContext();">复制命令</button><div class="ctx-divider"></div><button class="ctx-item" onclick="toggleFav(\''+escAttr(cmd)+'\');hideContext();" style="color:'+(isF?'var(--gold)':'var(--text)')+'">'+(isF?'取消收藏':'收藏')+'</button><div class="ctx-divider"></div><button class="ctx-item" onclick="moveToBackup(\''+escAttr(cmd)+'\');hideContext();" style="color:var(--text3)">移到备份</button>';contextMenu.style.display="block";contextMenu.style.left=Math.min(e.clientX,window.innerWidth-160)+"px";contextMenu.style.top=Math.min(e.clientY,window.innerHeight-130)+"px";setTimeout(function(){document.addEventListener("click",hideContext,{once:true});},0);}
function hideContext(){contextMenu.style.display="none";contextMenu.innerHTML="";}
function moveToBackup(cmd){var n=cmd.replace(/^\//,'');fetch("/api/backup-skill?skill="+encodeURIComponent(n)).then(function(r){return r.json();}).then(function(d){if(d.ok){showToast("已备份 "+cmd);bkBtn._updateCount();refreshStats();if(activeCat)selectCat(activeCat);else showFavorites();}else{showToast("备份失败: "+cmd);}});}
function openSpotlight(){spotlightOverlay.classList.add("show");spotlightInput.value="";spotlightIdx=-1;spotlightData=[];spotlightInput.focus();}
function closeSpotlight(){spotlightOverlay.classList.remove("show");spotlightIdx=-1;}
function spotlightSearch(){var q=spotlightInput.value.toLowerCase().trim();spotlightIdx=-1;if(!q){spotlightResults.innerHTML='';return;}var r=[];CATS.forEach(function(c){c.skills.forEach(function(s){if(s.cmd.toLowerCase().indexOf(q)!==-1||s.desc.toLowerCase().indexOf(q)!==-1)r.push({cmd:s.cmd,cat:c.label,desc:s.desc,icon:c.icon});});});spotlightData=r;if(r.length===0){spotlightResults.innerHTML='<div class="spotlight-no">没找到 &ldquo;'+esc(q)+'&rdquo;</div>';return;}spotlightResults.innerHTML=r.map(function(x,i){return '<div class="spotlight-item'+(i===spotlightIdx?' selected':'')+'" onclick="spotlightPick(\''+escAttr(x.cmd)+'\')"><span class="sp-cmd">'+esc(x.cmd)+'</span><span class="sp-desc">'+esc(x.desc)+'</span><span class="sp-cat">'+esc(x.cat)+'</span></div>';}).join("");}
function spotlightPick(cmd){closeSpotlight();copySkillDirect(cmd);}
document.addEventListener("keydown",function(e){if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();openSpotlight();return;}if(e.key==="Escape"){if(spotlightOverlay.classList.contains("show")){closeSpotlight();return;}hideContext();}if(spotlightOverlay.classList.contains("show")){if(e.key==="ArrowDown"){e.preventDefault();spotlightIdx=Math.min(spotlightIdx+1,spotlightData.length-1);spotlightSearch();}else if(e.key==="ArrowUp"){e.preventDefault();spotlightIdx=Math.max(spotlightIdx-1,0);spotlightSearch();}else if(e.key==="Enter"&&spotlightIdx>=0){e.preventDefault();spotlightPick(spotlightData[spotlightIdx].cmd);}}});
function openVertical(){fetch("/api/launch-vertical").catch(function(){});}

// 收藏s category
function addFavCat(){var d=document.createElement("div");d.className="sidebar-fav-label";d.textContent="收藏";d.style.marginTop="12px";sidebar.appendChild(d);var b=document.createElement("button");b.className="cat-btn";b.style.color="var(--gold)";b.innerHTML=ICONS.star+'<span class="cat-label">我的收藏</span><span class="cat-badge fav-count">0</span>';b.title="我的收藏";b.onclick=function(){showFavorites();};sidebar.appendChild(b);b._updateCount=function(){var c=getFavs().length;b.querySelector(".fav-count").textContent=c;b.style.display=c>0?"":"none";d.style.display=c>0?"":"none";};b._updateCount();return b;}
function showFavorites(){var f=getFavs();activeCat=null;CATS.forEach(function(c){c._btn.classList.remove("active");});headerIcon.innerHTML='<span style="color:var(--gold)">&#9733;</span>';headerTitle.textContent="我的收藏";headerCount.textContent=f.length+" 个技能";if(f.length===0){content.innerHTML='<div class="empty-state"><div class="empty-icon" style="color:var(--gold)">&#9733;</div><div class="empty-title">还没有收藏</div><div class="empty-desc">右键点击技能卡片 → 收藏</div></div>';return;}var s=[];CATS.forEach(function(c){c.skills.forEach(function(x){if(f.indexOf(x.cmd)>-1){x._catLabel=c.label;s.push(x);}});});renderSkills(s,true);}
var favBtn=addFavCat();

// Backup category
function addBkCat(){var d=document.createElement("div");d.className="sidebar-fav-label";d.textContent="备份";d.style.marginTop="4px";sidebar.appendChild(d);var b=document.createElement("button");b.className="cat-btn";b.style.color="var(--text-3)";b.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg><span class="cat-label">备份仓库</span><span class="cat-badge bk-count">0</span>';b.title="备份仓库";b.onclick=function(){showBackup();};sidebar.appendChild(b);b._updateCount=function(){fetch("/api/backup").then(function(r){return r.json();}).then(function(d){b.querySelector(".bk-count").textContent=d.total_skills;});};b._updateCount();return b;}
function showBackup(){activeCat=null;CATS.forEach(function(c){c._btn.classList.remove("active");});headerIcon.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>';headerTitle.textContent="备份仓库";headerCount.textContent="加载中...";fetch("/api/backup").then(function(r){return r.json();}).then(function(d){headerCount.textContent=d.total_skills+" 个已备份";if(d.total_skills===0){content.innerHTML='<div class="empty-state"><div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg></div><div class="empty-title">备份仓库为空</div><div class="empty-desc">没有已备份的技能</div></div>';return;}content.innerHTML=d.skills.map(function(n){return '<div class="skill-card backup-card" style="display:flex;flex-direction:row;align-items:center;gap:10px;"><div style="flex:1"><div class="skill-cmd">'+esc(n)+'</div></div><button class="restore-btn" onclick="event.stopPropagation();restoreSkill(\''+escAttr(n)+'\')" style="padding:5px 14px;border-radius:16px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--font-body);transition:all 150ms;">恢复</button></div>';}).join("");});}
function restoreSkill(n){fetch("/api/restore-backup?skill="+encodeURIComponent(n)).then(function(r){return r.json();}).then(function(d){if(d.ok){showToast("已恢复 "+n);bkBtn._updateCount();refreshStats();showBackup();}});}
var bkBtn=addBkCat();

// Auto-categorization
var CAT_KW={product:["product","spec","requirement","brainstorm","idea"],dev:["dev","code","program","refactor","git","api","fullstack","frontend","backend","react","vue","angular","node","typescript","python","graphql","websocket","playwright","legacy","moderniz","mcp","prototype","llm","claude"],review:["review","audit","security","dependency","depend","grill","code review"],debug:["debug","diagnose","bug","fix","trace","root","investigat"],test:["test","tdd","verify","qa","e2e","playwright"],design:["design","ui","ux","css","color","font","style","motion","hover","animation","interface","brand","slide","dashboard","flowchart","timeline","diagram","sketch","figma","hue","token"],cloud:["cloud","terraform","microservice","aws","azure","gcp","k8s","kubernetes"],database:["sql","postgres","database","query"],dataeng:["flink","fluss","iceberg","iggy","lance","paimon","docker-compose","kafka","stream"],aiml:["ml","llm","fine-tun","lora","rag","embed","prompt engineer"],sre:["sre","monitor","chaos","slo","error budget"],academic:["academic","paper","reviewer","pipeline"],devops:["devops","ci","cd","docker","kubernetes","deploy","release","changelog"],research:["research","deep","search","explain","document","map","codebase","zoom"],pm:["sprint","plan","issue","triage","epic","story"],engineering:["architecture","guardrail","pre-commit","lint","husky","hook","shoehorn","scaffold","atlassian"],workflow:["workflow","caveman","token","handoff","loop","continuous","skill","config","keybind","superpower","init","bootstrap","conversation"],other:["roundtable","humble","karpathy","dream","reflect"]};
var PANEL_SKILLS={}, 个AddedCount=0;
function buildPanelIndex(){PANEL_SKILLS={};CATS.forEach(function(c){c.skills.forEach(function(s){PANEL_SKILLS[s.cmd.replace(/^\//,'')]=true;});});}
function 个Categorize(n,d){var t=((n||"")+" "+(d||"")).toLowerCase(),best="workflow",bestS=0;for(var cat in CAT_KW){var s=0;CAT_KW[cat].forEach(function(k){if(t.indexOf(k)!==-1)s++;});if(s>bestS){bestS=s;best=cat;}}return bestS>0?best:"other";}
function refreshStats(){fetch("/api/stats").then(function(r){return r.json();}).then(function(d){var live=d.total_skills;buildPanelIndex();var nS=[];if(d.skills&&d.skills.length>0){d.skills.forEach(function(s){if(!PANEL_SKILLS[s.name])nS.push(s);});}if(nS.length>0){nS.forEach(function(s){var already=false;CATS.forEach(function(c){c.skills.forEach(function(x){if(x.cmd==="/"+s.name)already=true;});});if(already)return;var cn=autoCategorize(s.name,s.desc||""),fc=null;CATS.forEach(function(c){if(c.id===cn)fc=c;});if(!fc)CATS.forEach(function(c){if(c.id==="other")fc=c;});if(fc){fc.skills.push({cmd:"/"+s.name,desc:(s.desc||"").substring(0,40)});autoAddedCount++;}PANEL_SKILLS[s.name]=true;});}var panel=0;CATS.forEach(function(c){panel+=c.skills.length;var b=c._btn?c._btn.querySelector(".cat-badge"):null;if(b)b.textContent=c.skills.length;});if(autoAddedCount>0&&live===panel)headerTotal.textContent=live+" 个技能 (+"+autoAddedCount+" 个)";else if(live!==panel)headerTotal.textContent=live+" 个技能 ("+panel+" 个)";else headerTotal.textContent=live+" 个技能";}).catch(function(){});}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escAttr(s){return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ---- Density toggle ----
var DENSITY_KEY="skills_panel_density";
function toggleDensity(){var c=document.body.classList.toggle("compact");try{localStorage.setItem(DENSITY_KEY,c?"compact":"comfortable");}catch(e){}}
(function(){try{if(localStorage.getItem(DENSITY_KEY)==="compact")document.body.classList.add("compact");}catch(e){}})();

// Init sidebar
CATS.forEach(function(cat){var b=document.createElement("button");b.className="cat-btn";b.innerHTML=cat.icon+'<span class="cat-label">'+esc(cat.label)+'</span><span class="cat-badge">'+cat.skills.length+'</span>';b.title=cat.label;b.onclick=function(){selectCat(cat);};cat._btn=b;sidebar.appendChild(b);});

buildPanelIndex();refreshStats();setInterval(refreshStats,30000);renderRecent();favBtn._updateCount();
</script>
</body>
</html>
