<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技能</title>
<style>
:root {
  --bg: #0b0b14;
  --surface: #151523;
  --surface2: #1a1a2c;
  --border: #232338;
  --border2: rgba(255,255,255,0.10);
  --text: #e4e4f0;
  --text2: #9898b4;
  --text3: #686888;
  --accent-1: #a78bfa;
  --accent-2: #67e8f9;
  --accent-3: #f472b6;
  --accent-glow: rgba(167,139,250,0.15);
  --radius: 8px;
  --radius-sm: 6px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", system-ui, sans-serif;
  --mono: "SF Mono", "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 12px; line-height: 1.5;
  overflow: hidden; user-select: none; -webkit-user-select: none;
}

/* Main strip */
/* Top bar */
.top-bar {
  height: 30px; min-height: 30px; width: 100%; display: flex;
  align-items: center; justify-content: flex-end; padding: 0 8px;
  background: var(--bg); flex-shrink: 0; gap: 4px; border-bottom: 1px solid var(--border);
}
.top-bar .win-btn {
  width: 28px; height: 22px; border-radius: 4px; border: none;
  background: transparent; cursor: pointer; color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  transition: all 150ms;
}
.top-bar .win-btn:hover { background: rgba(255,255,255,0.08); color: var(--text2); }
.top-bar .win-btn.close:hover { background: #e81123; color: #fff; }

.strip {
  display: flex; flex-direction: column; align-items: center;
  width: 48px; padding: 4px 0 6px; gap: 3px;
  background: var(--bg); border-right: 1px solid var(--border);
  overflow-y: auto; position: relative; z-index: 10; flex: 1;
}
.strip::-webkit-scrollbar { width: 0; }

.strip-logo {
  width: 30px; height: 30px; border-radius: var(--radius-sm); flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 6px; cursor: pointer;
  box-shadow: 0 0 12px rgba(167,139,250,0.2);
}
.strip-logo svg { width: 15px; height: 15px; color: #fff; }

.strip-btn {
  width: 36px; height: 36px; border-radius: var(--radius-sm); border: none;
  background: transparent; cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: var(--text3); flex-shrink: 0;
  transition: all 180ms var(--ease-out); position: relative;
}
.strip-btn:hover { background: rgba(255,255,255,0.05); color: var(--text2); }
.strip-btn.active { background: var(--accent-glow); color: var(--accent-1); box-shadow: 0 0 12px var(--accent-glow); }
.strip-btn.active::after {
  content: ""; position: absolute; right: 0; top: 10px; bottom: 10px;
  width: 2px; background: linear-gradient(180deg, var(--accent-1), var(--accent-3));
  border-radius: 1px 0 0 1px;
}
.strip-btn svg { width: 17px; height: 17px; flex-shrink: 0; }

.strip-bottom {
  margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 3px;
}

/* Popup panel - slides out from the strip */
.popup {
  position: fixed; left: 52px; top: 0; bottom: 0; width: 290px; z-index: 100;
  background: var(--surface); border: 1px solid var(--border);
  border-left: 1px solid var(--border2); display: none; flex-direction: column;
  box-shadow: 8px 0 40px rgba(0,0,0,.5); animation: popupSlide 200ms var(--ease-out);
  overflow: hidden;
}
.popup.show { display: flex; }
@keyframes popupSlide {
  from { opacity: 0; transform: translateX(-12px); }
  to { opacity: 1; transform: translateX(0); }
}

.popup-hd {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,.2); flex-shrink: 0;
}
.popup-hd .popup-icon { color: var(--accent-1); display: flex; }
.popup-hd .popup-icon svg { width: 18px; height: 18px; }
.popup-hd .popup-title { font-weight: 600; font-size: 13px; flex: 1; }
.popup-hd .popup-count {
  font-size: 10px; color: var(--text3); background: rgba(255,255,255,0.04);
  border-radius: 10px; padding: 1px 8px;
}
.popup-hd .popup-close {
  width: 26px; height: 26px; border-radius: var(--radius-sm); border: none;
  background: transparent; cursor: pointer; color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  transition: all 150ms;
}
.popup-hd .popup-close:hover { background: rgba(255,255,255,0.06); color: var(--text); }

.popup-search {
  padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.popup-search input {
  width: 100%; padding: 6px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: rgba(255,255,255,0.03);
  color: var(--text); font-size: 11px; font-family: var(--font); outline: none;
  transition: border-color 180ms;
}
.popup-search input::placeholder { color: var(--text3); }
.popup-search input:focus { border-color: var(--accent-1); }

.popup-body {
  flex: 1; overflow-y: auto; padding: 8px 10px;
  display: flex; flex-direction: column; gap: 4px;
}
.popup-body::-webkit-scrollbar { width: 3px; }
.popup-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.skill-row {
  padding: 9px 12px; border-radius: var(--radius-sm); cursor: pointer;
  transition: all 150ms var(--ease-out); border: 1px solid transparent;
}
.skill-row:hover { background: rgba(255,255,255,0.04); border-color: var(--border); }
.skill-row:active { transform: scale(0.98); transition: 60ms; }
.skill-row .skill-cmd {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.skill-row .skill-desc { font-size: 10px; color: var(--text2); line-height: 1.4; margin-top: 1px; }
.skill-row.copied { animation: rowFlash 400ms var(--ease-out); border-color: var(--accent-1); }
@keyframes rowFlash {
  0% { background: var(--accent-glow); }
  100% { background: transparent; }
}
.no-match { text-align: center; padding: 20px; color: var(--text3); font-size: 11px; }

/* Toast */
.toast-wrap {
  position: fixed; bottom: 16px; left: 50%; z-index: 999;
  pointer-events: none; display: flex; flex-direction: column; align-items: center;
}
.toast {
  background: rgba(20,20,40,0.9); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 8px 14px; font-size: 11px;
  color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,.6);
  animation: toastIn 300ms var(--ease-spring); display: flex; align-items: center;
  gap: 7px; pointer-events: auto; backdrop-filter: blur(16px);
}
.toast svg { color: #34d399; }
.toast code {
  background: rgba(255,255,255,0.07); color: var(--accent-1);
  padding: 2px 6px; border-radius: 3px; font-family: var(--mono); font-size: 10px;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px) scale(0.94); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.toast.out { opacity: 0; transform: translateY(-6px) scale(0.95); transition: all 250ms; }
</style>
</head>

// ---- Build strip buttons ----
var strip = document.getElementById("strip");
var popup = document.getElementById("popup");
var popupIcon = document.getElementById("popupIcon");
var popupTitle = document.getElementById("popupTitle");
var popupCount = document.getElementById("popupCount");
var popupBody = document.getElementById("popupBody");
var popupSearch = document.getElementById("popupSearch");
var currentCat = null;

CATS.forEach(function(cat) {
  var btn = document.createElement("button");
  btn.className = "strip-btn";
  btn.innerHTML = cat.icon;
  btn.title = cat.label + "（" + cat.skills.length + "个）";
  btn.onclick = function(e) { e.stopPropagation(); openPopup(cat); };
  cat._btn = btn;
  strip.appendChild(btn);
});

function openPopup(cat) {
  CATS.forEach(function(c) { c._btn.classList.remove("active"); });
  cat._btn.classList.add("active");
  currentCat = cat;
  popupIcon.innerHTML = cat.icon;
  popupTitle.textContent = cat.label;
  popupCount.textContent = cat.skills.length + "个";
  popupSearch.value = "";
  renderPopupSkills(cat.skills);
  popup.classList.add("show");
  popupSearch.focus();
}

function closePopup() {
  popup.classList.remove("show");
  CATS.forEach(function(c) { c._btn.classList.remove("active"); });
  currentCat = null;
}

function filterPopup() {
  if (!currentCat) return;
  var q = popupSearch.value.toLowerCase().trim();
  renderPopupSkills(q ? currentCat.skills.filter(function(s) { return s.cmd.toLowerCase().indexOf(q) !== -1 || s.desc.indexOf(q) !== -1; }) : currentCat.skills);
}

function renderPopupSkills(skills) {
  if (skills.length === 0) {
    popupBody.innerHTML = '<div class="no-match">没找到匹配的技能</div>';
    return;
  }
  popupBody.innerHTML = skills.map(function(s) {
    return '<div class="skill-row" data-cmd="' + escAttr(s.cmd) + '" onclick="copySkill(this)"><div class="skill-cmd">' + esc(s.cmd) + '</div><div class="skill-desc">' + esc(s.desc) + '</div></div>';
  }).join("");
}

function copySkill(row) {
  var cmd = row.dataset.cmd;
  row.classList.add("copied");
  setTimeout(function() { row.classList.remove("copied"); }, 400);
  navigator.clipboard.writeText(cmd).then(function() { showToast(cmd); }).catch(function() { showToast(cmd); });
}

// ---- Toast ----
function showToast(cmd) {
  var wrap = document.getElementById("toastWrap");
  var toast = document.createElement("div");
  toast.className = "toast";
  toast.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 已复制 <code>' + esc(cmd) + '</code>';
  wrap.appendChild(toast);
  var timer = setTimeout(function() {
    toast.classList.add("out");
    setTimeout(function() { toast.remove(); }, 250);
  }, 2000);
  toast._timer = timer;
}

// ---- Keyboard ----
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") { closePopup(); }
});

// ---- Helpers ----
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escAttr(s) { return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

</script>
